<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Transporte — Igreja Viagens</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sb-head">
      <div class="sb-logo"><img src="imagens/logo.png" alt="Logo"></div>
      <div class="sb-brand"><div class="name">Igreja Viagens</div><div class="role" id="sb-sub">Painel Admin</div></div>
    </div>
    <nav class="sb-nav" id="sb-nav"></nav>
    <div class="sb-foot">
      <div class="sb-avatar" id="sb-ava">A</div>
      <div class="sb-uinfo"><div class="uname" id="sb-name">—</div><div class="urole" id="sb-role">—</div></div>
      <button class="sb-out" onclick="logout()" title="Sair"><i data-lucide="power" class="lucide-icon"></i></button>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="tb-left">
        <button class="menu-tog" id="menu-tog"><i data-lucide="menu" class="lucide-icon"></i></button>
        <div><div class="pg-title">Transporte</div><div class="pg-crumb" id="pg-trip-name"></div></div>
      </div>
    </header>
    <div class="page">
      <div class="sec-head mb3">
        <h2><i data-lucide="bus" class="lucide-icon"></i> Mapa de Assentos</h2>
      </div>
      <div id="transport-container"></div>
    </div>
  </div>
</div>
<script src="js/script.js"></script>

<script>document.addEventListener("DOMContentLoaded", function(){ if(window.lucide) lucide.createIcons(); });</script>
</body>
</html>
